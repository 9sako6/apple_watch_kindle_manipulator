name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: userscript-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify release tag
        run: npm run release:verify
      - name: Check and build
        run: npm run check
      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" dist/kindle-remote.user.js --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
        env:
          GH_TOKEN: ${{ github.token }}
